# PostgreSQL для EventApi — совпадает с ConnectionStrings:DefaultConnection в appsettings.json
# Запуск из корня репозитория: docker compose up -d
# Остановка: docker compose down
# Данные сохраняются в именованном томе eventapi_pgdata

services:
  postgres:
    image: postgres:16-alpine
    container_name: eventmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventmanager
    ports:
      - "5432:5432"
    volumes:
      - eventmanager_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  eventmanager_pgdata:
